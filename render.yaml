services:
  # ── API Server (Node.js Web Service) ─────────────────────────────────────────
  - type: web
    name: webforge-api
    runtime: node
    region: singapore
    branch: main
    rootDir: .
    buildCommand: "corepack enable && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build"
    startCommand: "node artifacts/api-server/dist/index.mjs"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: REDIS_TOKEN
        sync: false

  # ── Frontend (React/Vite Static Site) ────────────────────────────────────────
  - type: web
    name: webforge-app
    runtime: static
    region: singapore
    branch: main
    rootDir: .
    buildCommand: "corepack enable && pnpm install --frozen-lockfile && pnpm --filter @workspace/hostel-app run build"
    staticPublishPath: artifacts/hostel-app/dist/public
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
