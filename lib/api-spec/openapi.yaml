        studentId:
          type: integer
        studentName:
          type: string
        gatePassId:
          type: ["integer", "null"]
        type:
          type: string
          enum: [entry, exit]
        method:
          type: string
          enum: [qr, face, manual]
        timestamp:
          type: string
          format: date-time
