          type: integer
        gatePassId:
          type: ["integer", "null"]
        type:
          type: string
          enum: [entry, exit]
        method:
          type: string
          enum: [qr, face, manual]
        isTailgating:
          type: boolean

    LeaveRequest:
      type: object
      required: [id, studentId, fromDate, toDate, destination, reason, status]
      properties:
        id:
          type: integer
        studentId:
          type: integer
        studentName:
          type: string
        fromDate:
          type: string
          format: date
        toDate:
          type: string
          format: date
        destination:
          type: string
        reason:
          type: string
        emergencyContact:
          type: string
        status:
          type: string
          enum: [pending, warden_approved, admin_approved, rejected]
        wardenRemarks:
          type: ["string", "null"]
        adminRemarks:
          type: ["string", "null"]
        createdAt:
          type: string
